<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LenovaTech — Why Choose Us</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html,body { background: #0a1018; }

  /* META FEED SQUARE: 1080 x 1080 */
  .creative {
    width: 1080px; height: 1080px;
    background:
      radial-gradient(circle at 15% 10%, rgba(0,191,165,0.18), transparent 45%),
      radial-gradient(circle at 90% 95%, rgba(124,255,107,0.12), transparent 45%),
      linear-gradient(155deg, #0a1018 0%, #0f1a28 55%, #0a1018 100%);
    font-family: 'Inter', sans-serif;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
    padding: 72px;
  }
  .grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,191,165,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,191,165,0.04) 1px, transparent 1px); background-size: 54px 54px; -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 35%, transparent 78%); }
  .ring { position: absolute; border-radius: 50%; }
  .ring-1 { width: 600px; height: 600px; top: -180px; left: -180px; border: 1.5px solid rgba(0,191,165,0.10); }

  .inner { position: relative; z-index: 3; flex: 1; display: flex; flex-direction: column; }

  .header { display: flex; align-items: center; justify-content: space-between; }
  .brand { display: flex; align-items: center; gap: 16px; }
  .hex { width: 58px; height: 64px; display: flex; align-items: center; justify-content: center; }
  .hex svg { width: 100%; height: 100%; }
  .brand-name { font-size: 29px; font-weight: 800; letter-spacing: 1px; }
  .brand-name .a { color: #fff; } .brand-name .b { background: linear-gradient(120deg,#00bfa5,#7cff6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .brand-sub { font-size: 11px; font-weight: 500; letter-spacing: 4px; color: #6b7a8f; margin-top: 5px; }
  .tag { font-size: 14px; font-weight: 600; color: #00bfa5; padding: 10px 22px; border: 1px solid rgba(0,191,165,0.35); border-radius: 100px; background: rgba(0,191,165,0.06); }

  .pill { align-self: center; margin-top: 50px; font-size: 14px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #7cff6b; padding: 9px 22px; border-radius: 8px; background: rgba(124,255,107,0.08); border: 1px solid rgba(124,255,107,0.25); }
  .headline { text-align: center; margin-top: 22px; font-size: 64px; font-weight: 900; color: #f1f5f9; line-height: 1.06; letter-spacing: -1.2px; }
  .headline .grad { background: linear-gradient(120deg,#00bfa5,#7cff6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 50px; }
  .stat { text-align: center; background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid rgba(0,191,165,0.18); border-radius: 18px; padding: 28px 14px; }
  .stat .n { font-size: 50px; font-weight: 900; background: linear-gradient(120deg,#00bfa5,#7cff6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .stat .l { font-size: 15px; color: #9fb0c3; font-weight: 600; margin-top: 10px; }

  /* REASONS */
  .reasons { margin-top: 26px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .reason { display: flex; align-items: center; gap: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 22px 24px; }
  .reason .ck { flex: none; width: 42px; height: 42px; border-radius: 11px; background: linear-gradient(120deg,#00bfa5,#7cff6b); display: flex; align-items: center; justify-content: center; font-size: 22px; color: #06121a; font-weight: 900; }
  .reason .t { font-size: 19px; font-weight: 700; color: #e7eef6; }

  .footer { margin-top: auto; display: flex; align-items: center; justify-content: space-between; padding-top: 30px; border-top: 1px solid rgba(255,255,255,0.08); }
  .cta { padding: 19px 40px; border-radius: 14px; background: linear-gradient(120deg,#00bfa5,#7cff6b); color: #06121a; font-size: 21px; font-weight: 800; box-shadow: 0 12px 40px rgba(0,191,165,0.35); }
  .contact { display: flex; flex-direction: column; gap: 7px; align-items: flex-end; }
  .contact .row { font-size: 17px; color: #c3d0de; font-weight: 600; } .contact .row span { color: #6b7a8f; }
</style>
</head>
<body>
<div class="creative">
  <div class="grid"></div>
  <div class="ring ring-1"></div>
  <div class="inner">
    <div class="header">
      <div class="brand">
        <div class="hex">
          <svg viewBox="0 0 50 54" fill="none">
            <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a6fb5"/><stop offset="50%" stop-color="#00bfa5"/><stop offset="100%" stop-color="#7cff6b"/></linearGradient></defs>
            <polygon points="25,2 46,14 46,40 25,52 4,40 4,14" stroke="url(#g1)" stroke-width="2.5" fill="rgba(0,191,165,0.05)"/>
            <path d="M19,15 L19,38 L35,38" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M19,15 L30,24" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none"/>
            <circle cx="46" cy="14" r="2.4" fill="#7cff6b"/>
          </svg>
        </div>
        <div>
          <div class="brand-name"><span class="a">LENOVA</span><span class="b">TECH</span></div>
          <div class="brand-sub">INNOVATIVE IT SOLUTIONS</div>
        </div>
      </div>
      <div class="tag">lenovatech.site</div>
    </div>

    <div class="pill">Why Choose Us</div>
    <div class="headline">Trusted by <span class="grad">50+ Businesses</span></div>

    <div class="stats">
      <div class="stat"><div class="n">9+</div><div class="l">Years Experience</div></div>
      <div class="stat"><div class="n">150+</div><div class="l">Projects Delivered</div></div>
      <div class="stat"><div class="n">98%</div><div class="l">Client Retention</div></div>
    </div>

    <div class="reasons">
      <div class="reason"><div class="ck">✓</div><div class="t">100% Custom Code</div></div>
      <div class="reason"><div class="ck">✓</div><div class="t">You Own the Source</div></div>
      <div class="reason"><div class="ck">✓</div><div class="t">In-House Expert Team</div></div>
      <div class="reason"><div class="ck">✓</div><div class="t">On-Time Delivery</div></div>
    </div>

    <div class="footer">
      <div class="cta">Start Your Project →</div>
      <div class="contact">
        <div class="row"><span>📞</span> 0330-6553479</div>
        <div class="row"><span>✉️</span> lenovatech69@gmail.com</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
