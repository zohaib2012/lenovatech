<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LenovaTech Logo — Icon</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html,body { background: transparent; }
  .canvas { width: 600px; height: 600px; display: flex; align-items: center; justify-content: center; }
  .hex { width: 460px; height: 510px; }
  .hex svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="canvas">
  <div class="hex">
    <svg viewBox="0 0 50 54" fill="none">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1a6fb5"/><stop offset="50%" stop-color="#00bfa5"/><stop offset="100%" stop-color="#7cff6b"/></linearGradient>
      </defs>
      <polygon points="25,2 46,14 46,40 25,52 4,40 4,14" stroke="url(#g1)" stroke-width="2.5" fill="rgba(0,191,165,0.06)"/>
      <path d="M19,15 L19,38 L35,38" stroke="url(#g1)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M19,15 L30,24" stroke="url(#g1)" stroke-width="3" stroke-linecap="round" fill="none"/>
      <circle cx="46" cy="14" r="2.6" fill="#7cff6b"/>
    </svg>
  </div>
</div>
</body>
</html>
